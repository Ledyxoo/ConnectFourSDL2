name: Build Connect Four

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        run: |
          mkdir release-linux
          cp build/ConnectFour release-linux/
          cp -r Assets release-linux/
          tar -czf ConnectFour-Linux.tar.gz release-linux/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConnectFour-Linux
          path: ConnectFour-Linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 (vcpkg)
        run: |
          vcpkg install sdl2 sdl2-image sdl2-mixer sdl2-ttf --triplet x64-windows

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        shell: pwsh
        run: |
          mkdir release-windows
          cp build/Release/ConnectFour.exe release-windows/
          cp -r Assets release-windows/
          # Copie des DLLs nécessaires
          cp $env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/*.dll release-windows/
          Compress-Archive -Path release-windows/* -DestinationPath ConnectFour-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConnectFour-Windows
          path: ConnectFour-Windows.zip
